name: Deploy to GitHub Pages

# Build the Vite app and publish dist/ to GitHub Pages on every push to main.
on:
  push:
    branches: [main]
  workflow_dispatch: # allow manual runs from the Actions tab

# Permissions required by the Pages deploy action
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress production deploy
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          # Once you commit package-lock.json you can speed builds up by adding:
          #   cache: npm
          # and switching the install step below to `npm ci`.

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true # turns Pages on (source = GitHub Actions) automatically

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
